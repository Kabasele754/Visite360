{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 | Page Not Found</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Arial, sans-serif;
            color: #fff;
            background:
                radial-gradient(circle at top, rgba(103, 232, 249, 0.16), transparent 30%),
                radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.15), transparent 26%),
                linear-gradient(180deg, #071220 0%, #0b1d34 48%, #0c2544 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .error-shell {
            width: min(100%, 920px);
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,.12);
            background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
            backdrop-filter: blur(22px);
            box-shadow: 0 28px 70px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.10);
            overflow: hidden;
        }
        .error-grid {
            display: grid;
            grid-template-columns: 1.05fr .95fr;
            min-height: 560px;
        }
        .error-visual,
        .error-content {
            position: relative;
            padding: 40px;
        }
        .error-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .error-orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(70px);
        }
        .error-orb.a {
            width: 260px; height: 260px;
            background: rgba(103,232,249,.18);
            top: 12%; left: 18%;
        }
        .error-orb.b {
            width: 220px; height: 220px;
            background: rgba(96,165,250,.16);
            bottom: 10%; right: 10%;
        }
        .error-card-3d {
            position: relative;
            width: 260px;
            height: 260px;
            transform-style: preserve-3d;
            transform: rotateX(58deg) rotateZ(-25deg);
        }
        .error-layer {
            position: absolute;
            inset: 0;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,.12);
            background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
            box-shadow: 0 16px 34px rgba(0,0,0,.18);
        }
        .error-layer.l1 { transform: translate3d(0, 0, 0); }
        .error-layer.l2 { transform: translate3d(16px, 16px, -18px); }
        .error-layer.l3 { transform: translate3d(32px, 32px, -36px); }
        .error-code {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 84px;
            font-weight: 900;
            letter-spacing: -.08em;
            color: #fff;
            text-shadow: 0 20px 50px rgba(0,0,0,.24);
        }
        .error-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .error-kicker {
            margin: 0 0 12px;
            font-size: 11px;
            letter-spacing: .32em;
            font-weight: 900;
            text-transform: uppercase;
            color: rgba(186,245,255,.92);
        }
        .error-title {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.25rem);
            line-height: 1;
            letter-spacing: -.05em;
            font-weight: 900;
        }
        .error-description {
            margin: 16px 0 0;
            color: #d9e5f4;
            font-size: 16px;
            line-height: 1.7;
            max-width: 520px;
        }
        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 26px;
        }
        .error-btn {
            min-height: 50px;
            padding: 12px 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .error-btn:hover { transform: translateY(-2px); }
        .error-btn.primary {
            color: #071220;
            background: linear-gradient(135deg, #a5f3fc, #60a5fa);
            box-shadow: 0 16px 30px rgba(96,165,250,.24);
        }
        .error-btn.secondary {
            color: #fff;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.08);
        }
        .error-links {
            margin-top: 22px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .error-links a {
            color: rgba(220,236,255,.88);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }
        @media (max-width: 860px) {
            .error-grid { grid-template-columns: 1fr; }
            .error-visual { min-height: 280px; padding-bottom: 0; }
            .error-content { padding-top: 12px; }
        }
    </style>
</head>
<body>
    <div class="error-shell">
        <div class="error-grid">
            <div class="error-visual">
                <div class="error-orb a"></div>
                <div class="error-orb b"></div>
                <div class="error-card-3d" aria-hidden="true">
                    <div class="error-layer l3"></div>
                    <div class="error-layer l2"></div>
                    <div class="error-layer l1"></div>
                    <div class="error-code">400</div>
                </div>
            </div>
            <div class="error-content">
                <p class="error-kicker">Virtual Tour Platform</p>
                <h1 class="error-title">Bad request</h1>
                <p class="error-description">
                    The request could not be processed. Please refresh the page and try again, or return to the homepage.
                </p>
                <div class="error-actions">
                    <a href="/" class="error-btn primary">Back to Home</a>
                    <a href="javascript:history.back()" class="error-btn secondary">Go Back</a>
                </div>
                <div class="error-links">
                    <a href="/explorer/">Explore Tours</a>
                    <a href="/about/">About</a>
                    <a href="/contact/">Contact</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
