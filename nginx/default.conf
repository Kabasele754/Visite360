upstream django {
    server django:8000;
}

upstream pgadmin_upstream {
    server pgadmin:80;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =========================================
# HTTP -> garde ACME challenge + redirection HTTPS
# =========================================
server {
    listen 80;
    server_name s4e-elevateai.com www.s4e-elevateai.com api.s4e-elevateai.com pgadmin.s4e-elevateai.com;

    client_max_body_size 50M;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================
# HTTPS principal : site + api
# =========================================
server {
    listen 443 ssl http2;
    server_name s4e-elevateai.com www.s4e-elevateai.com api.s4e-elevateai.com;

    ssl_certificate /etc/letsencrypt/live/s4e-elevateai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s4e-elevateai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    server_tokens off;
    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}

# =========================================
# HTTPS pgAdmin
# =========================================
server {
    listen 443 ssl http2;
    server_name pgadmin.s4e-elevateai.com;

    ssl_certificate /etc/letsencrypt/live/s4e-elevateai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s4e-elevateai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    server_tokens off;
    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://pgadmin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;

        # Décommente seulement si tu as créé /etc/nginx/.htpasswd
        # auth_basic "Restricted Access";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}

# Sécurité supplémentaire globale
client_max_body_size 50M;
client_body_timeout 10s;
client_header_timeout 10s;
server_tokens off;

# Limitation de la connexion et des requêtes
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_conn conn_limit_per_ip 10;

limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=5r/s;
limit_req zone=req_limit_per_ip burst=10 nodelay;


